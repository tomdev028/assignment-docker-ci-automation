name: Lint Code Base
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{github.ref}}-${{github.workflow}}
  cancel-in-progress: true

permissions: {}


jobs:
  call-super-linter:
    name: Call Super-Linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name : Super-Linter
        uses: super-linter/super-linter@v7
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
